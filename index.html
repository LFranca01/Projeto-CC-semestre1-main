<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Entrar | Serginho Leva Atrás</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/login.css" />
    <script src="auth.js"></script>
    <script>redirectIfLogged();</script>
  </head>
  <body>
    <div class="login-shell">
      <!-- Brand panel — visible only on desktop (≥901px) -->
      <aside class="login-brand" aria-hidden="true">
        <img src="./assets/Logo.png" class="login-brand-logo" alt="" />
        <h1>Distribuidora Serginho</h1>
        <p>Hub Logístico: Conectando pedidos a motoristas com agilidade.</p>
      </aside>

      <!-- Login card — UNCHANGED. Mobile source of truth. -->
      <div class="login-card">
        <div class="login-logo-wrap">
          <img src="./assets/Logo.png" class="login-logo" alt="Logo Serginho Leva Atrás" />
          <span class="login-brand-text">Serginho Leva Atrás</span>
        </div>

        <h2>Acesse sua conta</h2>
        <p class="login-sub">Painel operacional da rede.</p>

        <form id="form-login">
          <div class="input-group">
            <input type="email" id="email" required placeholder=" " autocomplete="email" maxlength="100" />
            <label for="email">E-mail Corporativo</label>
          </div>
          <div class="input-group">
            <input type="password" id="senha" required placeholder=" " autocomplete="current-password" maxlength="64" />
            <label for="senha">Senha</label>
          </div>
          <button type="submit">
            <span class="material-icons-round">login</span>
            <span>Entrar</span>
          </button>
          <p id="erro" class="error-message"></p>
        </form>

        <div class="login-footer">
          <a href="#" onclick="recuperarSenha(); return false;">Esqueceu sua senha?</a>
        </div>

        <div class="login-credentials-hint">
          Credenciais de teste:
          <code>admin@sla.com</code> / <code>admin</code>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("form-login").addEventListener("submit", function (e) {
        e.preventDefault();
        const result = login(
          document.getElementById("email").value,
          document.getElementById("senha").value,
        );
        if (result.success) window.location.replace("inicio.html");
        else document.getElementById("erro").innerText = result.message;
      });
      function recuperarSenha() {
        const email = document.getElementById("email").value;
        if (!email) alert("Digite seu e-mail no campo acima.");
        else alert("Link de recuperação enviado para: " + email);
      }
    </script>
  </body>
</html>
