<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Financeiro | Serginho Leva Atras</title>
  
  <link rel="stylesheet" href="./styles/style.css">
  <link rel="stylesheet" href="./styles/logistica.css">
  <link rel="stylesheet" href="./styles/pedidos.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script>requireAuth();</script>
</head>
<body>

<div class="container">
  <aside class="sidebar">
    <div class="sidebar-header">
        <img src="./assets/Logo.png" alt="Logo">
    </div>
    <ul>
      <li><a href="inicio.html"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
      <li><a href="pedidos.html"><i data-lucide="shopping-cart"></i> Pedidos</a></li>
      <li><a href="clientes.html"><i data-lucide="users"></i> Clientes</a></li>
      <li><a href="produtos.html"><i data-lucide="package"></i> Produtos</a></li>
      <li class="active"><a href="financeiro.html"><i data-lucide="dollar-sign"></i> Financeiro</a></li>
      <li><a href="logistica.html"><i data-lucide="truck"></i> Logística</a></li>
    </ul>
  </aside>

  <main class="main">
    <div class="content">
      <div class="topbar">
        <div class="search-box" style="visibility: hidden;">
            <input type="text">
        </div>
        
        <div class="user-menu-container">
          <div class="user-menu" onclick="toggleMenu(event)">
              <img src="https://i.pravatar.cc/100" id="userAvatar">
              <div class="user-info">
                  <span class="user-name" id="userName">Carregando...</span>
              </div>
              <i data-lucide="chevron-down"></i>
          </div>
          <div id="dropdown-user" class="dropdown-content">
              <a href="javascript:void(0)" onclick="abrirModalPerfil(event)"><i data-lucide="user"></i> Perfil</a>
              <a href="#" onclick="logout()"><i data-lucide="log-out"></i> Sair</a>
          </div>
        </div>
      </div>

      <div class="page-title-section" style="margin-bottom: 20px;">
        <h1>Fluxo de Caixa e Pagamentos</h1>
      </div>

      <div class="metrics-section" style="flex-direction: row; margin-bottom: 30px; gap: 40px;">
        <div class="card">
          <div class="card-icon green"><i data-lucide="trending-up"></i></div>
          <div class="card-info">
            <p>Saldo Total Recibido</p>
            <h2 id="saldo-total">R$ 0,00</h2>
          </div>
        </div>
        <div class="card">
          <div class="card-icon blue"><i data-lucide="credit-card"></i></div>
          <div class="card-info">
            <p>Pagamentos Hoje</p>
            <h2 id="pagamentos-hoje">0</h2>
          </div>
        </div>
      </div>

      <div class="action-bar" style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
        
        <div class="filter-box" style="margin: 0; flex: 1; max-width: 850px;">
            <div class="filter-grid" style="grid-template-columns: 1.5fr 1fr 1fr auto; gap: 15px; align-items: flex-end;">
              <div class="form-group">
                <label>Período</label>
                <input type="date" id="filtro-data" onchange="filtrarFinanceiro()">
              </div>
              <div class="form-group">
                <label>Método</label>
                <select id="filtro-metodo" onchange="filtrarFinanceiro()">
                  <option value="">Todos</option>
                  <option value="Pix">Pix</option>
                  <option value="Cartão">Cartão</option>
                  <option value="Dinheiro">Dinheiro</option>
                </select>
              </div>
              <div class="form-group">
                <label>Status</label>
                <select id="filtro-status" onchange="filtrarFinanceiro()">
                  <option value="">Todos</option>
                  <option value="Pago">Pago</option>
                  <option value="Pendente">Pendente</option>
                </select>
              </div>
              <div class="filter-buttons">
                <button class="btn-secundary" onclick="limparFiltros()" style="height: 40px;">Limpar</button>
              </div>
            </div>
        </div>

        <button class="btn-primary" onclick="window.print()" style="height: 40px; display: flex; align-items: center; gap: 8px; white-space: nowrap; margin-bottom: 1px;">
            <i data-lucide="download" style="width: 18px;"></i> Exportar Relatório
        </button>
      </div>

      <div class="section-container">
        <table>
          <thead>
            <tr>
              <th>ID Pedido</th>
              <th>Data Pagamento</th>
              <th>Método</th>
              <th>Valor</th>
              <th>Status</th>
              <th style="text-align: right;">Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-financeiro"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    carregarDadosUsuario();
    renderFinanceiro();
    lucide.createIcons();
});

function carregarDadosUsuario() {
    const usuario = getUser();
    if (usuario) {
        document.getElementById("userName").textContent = usuario.nome;
        if (usuario.foto) document.getElementById("userAvatar").src = usuario.foto;
    }
}

function toggleMenu(event) {
    event.stopPropagation();
    document.getElementById("dropdown-user").classList.toggle("show");
}

window.onclick = () => document.getElementById("dropdown-user").classList.remove("show");

function renderFinanceiro() {
    const pagamentos = getPagamentos(); // Puxa do api.js
    const tabela = document.getElementById("tabela-financeiro");
    
    // Atualiza Métricas
    document.getElementById("saldo-total").innerText = formatarMoeda(getSaldoTotal());
    document.getElementById("pagamentos-hoje").innerText = pagamentos.filter(p => {
        const hoje = new Date().toISOString().split('T')[0];
        return p.dataPagamento === hoje;
    }).length;

    if (pagamentos.length === 0) {
        tabela.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 30px; color: var(--text-light)">Nenhum registro encontrado.</td></tr>';
        return;
    }

    tabela.innerHTML = pagamentos.map(p => `
        <tr>
            <td class="bold">#${p.pedidoId}</td>
            <td>${formatarData(p.dataPagamento)}</td>
            <td>${p.metodo}</td>
            <td><strong style="color: var(--accent)">${formatarMoeda(p.valor)}</strong></td>
            <td><span class="status entregue">${p.status}</span></td>
            <td style="text-align: right;">
                <button class="btn-icon" title="Ver Detalhes"><i data-lucide="eye" style="width:18px"></i></button>
            </td>
        </tr>
    `).join('');
    lucide.createIcons();
}

function filtrarFinanceiro() {
    const data = document.getElementById("filtro-data").value;
    const metodo = document.getElementById("filtro-metodo").value.toLowerCase();
    const status = document.getElementById("filtro-status").value.toLowerCase();

    document.querySelectorAll("#tabela-financeiro tr").forEach(linha => {
        const texto = linha.innerText.toLowerCase();
        const bateData = data === "" || texto.includes(formatarData(data));
        const bateMetodo = metodo === "" || texto.includes(metodo);
        const bateStatus = status === "" || texto.includes(status);

        linha.style.display = (bateData && bateMetodo && bateStatus) ? "" : "none";
    });
}

function limparFiltros() {
    document.getElementById("filtro-data").value = "";
    document.getElementById("filtro-metodo").value = "";
    document.getElementById("filtro-status").value = "";
    filtrarFinanceiro();
}
</script>

</body>
</html>
