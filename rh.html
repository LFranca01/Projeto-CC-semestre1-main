<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>RH | Sistema Empresarial</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="pedidos.css">
  <link rel="stylesheet" href="logistica.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script>requireAuth();</script>
</head>
<body>
<div class="container">
  <aside class="sidebar">
    <div class="sidebar-header"><img src="./assets/Logo.png" alt="Logo"></div>
    <ul>
      <li><a href="inicio.html"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
      <li><a href="pedidos.html"><i data-lucide="shopping-cart"></i> Pedidos</a></li>
      <li><a href="clientes.html"><i data-lucide="users"></i> Clientes</a></li>
      <li><a href="produtos.html"><i data-lucide="package"></i> Produtos</a></li>
      <li><a href="estoque.html"><i data-lucide="archive"></i> Estoque</a></li>
      <li class="active"><a href="rh.html"><i data-lucide="briefcase"></i> Funcionários</a></li>
      <li><a href="logistica.html"><i data-lucide="truck"></i> Logística</a></li>
    </ul>
  </aside>

  <main class="main">
    <div class="content">
      <div class="page-header">
        <h1>Recursos Humanos</h1>
        <button class="btn-primary" onclick="abrirModal()">+ Novo Funcionário</button>
      </div>

      <div class="section-container">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>CPF</th>
              <th>Cargo</th>
              <th>Unidade/Filial</th>
              <th>Admissão</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-rh"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="modalRH" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="tituloModal">Novo Colaborador</h2>
      <span class="close" onclick="fecharModal()">&times;</span>
    </div>
    <form onsubmit="event.preventDefault(); salvarFuncionario();">
      <div class="modal-body">
        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" id="nome" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00">
            </div>
            <div class="form-group">
                <label>Cargo</label>
                <input type="text" id="cargo" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Filial de Trabalho</label>
                <select id="idFilial" required></select>
            </div>
            <div class="form-group">
                <label>Data de Admissão</label>
                <input type="date" id="dataAdmissao" required>
            </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secundary" onclick="fecharModal()">Cancelar</button>
        <button type="submit" class="btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script>
let idEditando = null;

document.addEventListener("DOMContentLoaded", () => {
    renderRH();
    carregarFiliais();
    lucide.createIcons();
});

function renderRH() {
    const lista = getFuncionarios();
    const filiais = getFiliais();
    const tabela = document.getElementById("tabela-rh");

    tabela.innerHTML = lista.map(f => {
        const filial = filiais.find(fl => fl.id == f.idFilial);
        return `
            <tr>
                <td><strong>${f.nome}</strong></td>
                <td>${formatarDocumento(f.cpf)}</td>
                <td>${f.cargo}</td>
                <td>${filial ? filial.nome : 'Não alocado'}</td>
                <td>${formatarData(f.dataAdmissao)}</td>
                <td>
                    <button onclick="editar(${f.id})" class="btn-icon"><i data-lucide="edit"></i></button>
                    <button onclick="remover(${f.id})" class="btn-icon btn-delete"><i data-lucide="trash"></i></button>
                </td>
            </tr>
        `;
    }).join('');
    lucide.createIcons();
}

function carregarFiliais() {
    const filiais = getFiliais();
    document.getElementById("idFilial").innerHTML = filiais.map(f => `<option value="${f.id}">${f.nome}</option>`).join('');
}

function abrirModal() {
    idEditando = null;
    document.querySelector("form").reset();
    document.getElementById("tituloModal").innerText = "Novo Colaborador";
    document.getElementById("modalRH").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modalRH").style.display = "none";
}

function editar(id) {
    const f = getFuncionarios().find(item => item.id == id);
    idEditando = id;
    document.getElementById("tituloModal").innerText = "Editar Colaborador";
    document.getElementById("nome").value = f.nome;
    document.getElementById("cpf").value = f.cpf;
    document.getElementById("cargo").value = f.cargo;
    document.getElementById("idFilial").value = f.idFilial;
    document.getElementById("dataAdmissao").value = f.dataAdmissao.split('T')[0];
    document.getElementById("modalRH").style.display = "flex";
}

function salvarFuncionario() {
    const dados = {
        nome: document.getElementById("nome").value,
        cpf: document.getElementById("cpf").value,
        cargo: document.getElementById("cargo").value,
        idFilial: document.getElementById("idFilial").value,
        dataAdmissao: document.getElementById("dataAdmissao").value
    };

    if (idEditando) updateFuncionario(idEditando, dados);
    else createFuncionario(dados);

    fecharModal();
    renderRH();
}

function remover(id) {
    if(confirm("Deseja demitir/remover este colaborador?")) {
        deleteFuncionario(id);
        renderRH();
    }
}
</script>
</body>
</html>
