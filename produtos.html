<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Produtos | Serginho Leva Atras</title>
  
  <link rel="stylesheet" href="./styles/style.css">
  <link rel="stylesheet" href="./styles/logistica.css">
  <link rel="stylesheet" href="./styles/pedidos.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script>requireAuth();</script>
</head>
<body>

<div class="container">
  <aside class="sidebar">
    <div class="sidebar-header">
        <img src="./assets/Logo.png" alt="Logo">
    </div>
    <ul>
      <li><a href="inicio.html"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
      <li><a href="pedidos.html"><i data-lucide="shopping-cart"></i> Pedidos</a></li>
      <li><a href="clientes.html"><i data-lucide="users"></i> Clientes</a></li>
      <li class="active"><a href="produtos.html"><i data-lucide="package"></i> Produtos</a></li>
      <li><a href="financeiro.html"><i data-lucide="dollar-sign"></i> Financeiro</a></li>
      <li><a href="logistica.html"><i data-lucide="truck"></i> Logística</a></li>
    </ul>
  </aside>

  <main class="main">
    <div class="content">
      <div class="topbar">
        <div class="search-box" style="visibility: hidden;">
            <input type="text">
        </div>
        
        <div class="user-menu-container">
          <div class="user-menu" onclick="toggleMenu(event)">
              <img src="https://i.pravatar.cc/100" id="userAvatar">
              <div class="user-info">
                  <span class="user-name" id="userName">Carregando...</span>
              </div>
              <i data-lucide="chevron-down"></i>
          </div>
          <div id="dropdown-user" class="dropdown-content">
              <a href="javascript:void(0)" onclick="abrirModalPerfil(event)"><i data-lucide="user"></i> Perfil</a>
              <a href="#" onclick="logout()"><i data-lucide="log-out"></i> Sair</a>
          </div>
        </div>
      </div>

      <div class="page-title-section" style="margin-bottom: 20px;">
        <h1>Catálogo de Produtos</h1>
      </div>

      <div class="metrics-section" style="flex-direction: row; margin-bottom: 30px; gap: 40px;">
        <div class="card">
          <div class="card-icon blue"><i data-lucide="box"></i></div>
          <div class="card-info">
            <p>Itens no Catálogo</p>
            <h2 id="total-produtos">0</h2>
          </div>
        </div>
        <div class="card">
          <div class="card-icon orange"><i data-lucide="alert-triangle"></i></div>
          <div class="card-info">
            <p>Estoque Baixo</p>
            <h2 id="estoque-baixo">0</h2>
          </div>
        </div>
      </div>

      <div class="action-bar" style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
        
        <div class="filter-box" style="margin: 0; flex: 1; max-width: 850px;">
            <div class="filter-grid" style="grid-template-columns: 2fr 1.2fr 1fr auto; gap: 15px; align-items: flex-end;">
              <div class="form-group">
                <label>Busca Rápida</label>
                <input type="text" id="busca-rapida" placeholder="Nome ou código..." onkeyup="filtrarProdutos()">
              </div>
              <div class="form-group">
                <label>Código de Barras</label>
                <input type="text" id="filtro-codigo" placeholder="EAN/SKU" onkeyup="filtrarProdutos()">
              </div>
              <div class="form-group">
                <label>Unidade</label>
                <select id="filtro-unidade" onchange="filtrarProdutos()">
                  <option value="">Todas</option>
                  <option value="UN">UN</option>
                  <option value="KG">KG</option>
                  <option value="CX">CX</option>
                </select>
              </div>
              <div class="filter-buttons">
                <button class="btn-secundary" onclick="limparFiltros()" style="height: 40px;">Limpar</button>
              </div>
            </div>
        </div>

        <button class="btn-primary" onclick="abrirModal()" style="height: 40px; display: flex; align-items: center; gap: 8px; white-space: nowrap; margin-bottom: 1px;">
            <i data-lucide="plus" style="width: 18px;"></i> Novo Produto
        </button>
      </div>

      <div class="section-container">
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Cód. Barras</th>
              <th>Preço</th>
              <th>Estoque</th>
              <th>Un.</th>
              <th style="text-align: right;">Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-produtos"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="modalProduto" class="modal">
    <div class="modal-content" style="max-width: 650px;">
        <div class="modal-header">
            <h2 id="tituloModal">Novo Produto</h2>
            <span class="close" onclick="fecharModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group" style="grid-column: span 2;">
                    <label>Nome do Produto</label>
                    <input type="text" id="nome">
                </div>
                <div class="form-group">
                    <label>Código de Barras</label>
                    <input type="text" id="codigoBarras">
                </div>
                <div class="form-group">
                    <label>Unidade de Medida</label>
                    <select id="unidade">
                        <option value="UN">Unidade</option>
                        <option value="KG">Quilo</option>
                        <option value="CX">Caixa</option>
                        <option value="LT">Litro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Preço de Venda (R$)</label>
                    <input type="number" step="0.01" id="precoVenda">
                </div>
                <div class="form-group">
                    <label>Qtd. em Estoque</label>
                    <input type="number" id="estoque">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secundary" onclick="fecharModal()">Cancelar</button>
            <button class="btn-primary" onclick="salvarProduto()">Salvar Produto</button>
        </div>
    </div>
</div>

<script>
let produtoEditando = null;

document.addEventListener("DOMContentLoaded", () => {
    carregarDadosUsuario();
    renderProdutos();
    lucide.createIcons();
});

function carregarDadosUsuario() {
    const usuario = getUser();
    if (usuario) {
        document.getElementById("userName").textContent = usuario.nome;
        if (usuario.foto) document.getElementById("userAvatar").src = usuario.foto;
    }
}

function toggleMenu(event) {
    event.stopPropagation();
    document.getElementById("dropdown-user").classList.toggle("show");
}

window.onclick = () => document.getElementById("dropdown-user").classList.remove("show");

function renderProdutos() {
    const tabela = document.getElementById("tabela-produtos");
    const produtos = getProdutos();
    
    document.getElementById("total-produtos").textContent = produtos.length;
    document.getElementById("estoque-baixo").textContent = produtos.filter(p => p.estoque < 5).length;

    tabela.innerHTML = produtos.map(p => `
        <tr>
            <td class="bold">${p.nome}</td>
            <td><code>${p.codigoBarras || '---'}</code></td>
            <td>${formatarMoeda(p.precoVenda)}</td>
            <td><span style="${p.estoque < 5 ? 'color:#dc2626; font-weight:700' : ''}">${p.estoque}</span></td>
            <td>${p.unidade}</td>
            <td style="text-align: right;">
                <button class="btn-icon" onclick="editarProduto(${p.id})"><i data-lucide="edit-3" style="width:18px"></i></button>
                <button class="btn-icon" onclick="deletar(${p.id})" style="color:#dc2626; margin-left:10px;"><i data-lucide="trash-2" style="width:18px"></i></button>
            </td>
        </tr>
    `).join('');
    lucide.createIcons();
}

function filtrarProdutos() {
    const busca = document.getElementById("busca-rapida").value.toLowerCase();
    const codigo = document.getElementById("filtro-codigo").value.toLowerCase();
    const unidade = document.getElementById("filtro-unidade").value;

    document.querySelectorAll("#tabela-produtos tr").forEach(linha => {
        const texto = linha.innerText.toLowerCase();
        const bateBusca = texto.includes(busca);
        const bateCodigo = texto.includes(codigo);
        const bateUnidade = unidade === "" || texto.includes(unidade.toLowerCase());
        linha.style.display = (bateBusca && bateCodigo && bateUnidade) ? "" : "none";
    });
}

function limparFiltros() {
    document.getElementById("busca-rapida").value = "";
    document.getElementById("filtro-codigo").value = "";
    document.getElementById("filtro-unidade").value = "";
    filtrarProdutos();
}

function abrirModal() {
    produtoEditando = null;
    document.getElementById("tituloModal").innerText = "Novo Produto";
    document.getElementById("modalProduto").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modalProduto").style.display = "none";
}

function salvarProduto() {
    const dados = {
        nome: document.getElementById("nome").value,
        codigoBarras: document.getElementById("codigoBarras").value,
        precoVenda: parseFloat(document.getElementById("precoVenda").value) || 0,
        estoque: parseInt(document.getElementById("estoque").value) || 0,
        unidade: document.getElementById("unidade").value
    };
    if (produtoEditando) updateProduto(produtoEditando, dados);
    else createProduto(dados);
    fecharModal();
    renderProdutos();
}

function editarProduto(id) {
    const p = getProdutoById(id);
    produtoEditando = id;
    document.getElementById("tituloModal").innerText = "Editar Produto";
    document.getElementById("nome").value = p.nome;
    document.getElementById("codigoBarras").value = p.codigoBarras;
    document.getElementById("precoVenda").value = p.precoVenda;
    document.getElementById("estoque").value = p.estoque;
    document.getElementById("unidade").value = p.unidade;
    document.getElementById("modalProduto").style.display = "flex";
}

function deletar(id) {
    if (confirm("Remover este produto?")) {
        deleteProduto(id);
        renderProdutos();
    }
}
</script>
</body>
</html>
