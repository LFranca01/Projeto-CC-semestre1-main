<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes | Distribuidora Serginho</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <link rel="stylesheet" href="./styles/style.css">
  <link rel="stylesheet" href="./styles/logistica.css">
  <link rel="stylesheet" href="./styles/pedidos.css">
  
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script>requireAuth();</script>
</head>

<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
          <img src="./assets/Logo.png" alt="Logo">
      </div>
      <nav>
        <ul>
          <li>
            <a href="inicio.html">
              <span class="material-icons-round">dashboard</span> Dashboard
            </a>
          </li>
          <li>
            <a href="pedidos.html">
              <span class="material-icons-round">inventory_2</span> Pedidos
            </a>
          </li>
          <li class="active">
            <a href="clientes.html">
              <span class="material-icons-round">groups</span> Clientes
            </a>
          </li>
          <li>
            <a href="produtos.html">
              <span class="material-icons-round">category</span> Catálogo
            </a>
          </li>
          <li>
            <a href="estoques.html">
              <span class="material-icons-round">warehouse</span> Armazém
            </a>
          </li>
          <li>
            <a href="logistica.html">
              <span class="material-icons-round">local_shipping</span> Logística
            </a>
          </li>
          <li>
            <a href="rh.html">
              <span class="material-icons-round">badge</span> RH
            </a>
          </li>
          <li>
            <a href="financeiro.html">
              <span class="material-icons-round">payments</span> Financeiro
            </a>
          </li>
        </ul>
      </nav>
      <div class="sidebar-footer">
          <button onclick="logout()" class="btn-logout">
            <span class="material-icons-round">logout</span> Sair
          </button>
      </div>
    </aside>

    <main class="main">
      <header class="page-header-pedidos">
        <h1>Gestão de Clientes (Vendedores)</h1>
        <button class="btn-primary" onclick="abrirModal()">
          <span class="material-icons-round">person_add</span> Novo Cliente
        </button>
      </header>

      <section class="table-container">
        <table class="table-custom">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome / Razão Social</th>
              <th>Documento</th>
              <th>Cidade/Bairro</th>
              <th>Contato</th>
              <th class="text-right">Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-clientes">
            </tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="modalCliente" class="modal">
    <div class="modal-content pedido-modal-size">
      <div class="modal-header">
        <h2 id="tituloModal">Cadastrar Cliente</h2>
      </div>
      <form id="form-cliente" onsubmit="salvarCliente(); return false;">
        <div class="modal-body">
          <div class="input-group">
            <label>Tipo de Pessoa</label>
            <select id="tipoPessoa">
              <option value="F">Física</option>
              <option value="J">Jurídica</option>
            </select>
          </div>
          
          <div class="input-group">
            <label>Nome Completo / Razão Social</label>
            <input type="text" id="nome" required>
          </div>

          <div class="input-group">
            <label>CPF / CNPJ</label>
            <input type="text" id="documento" required>
          </div>

          <div class="filter-grid">
            <div class="input-group">
              <label>CEP</label>
              <input type="text" id="cep" onblur="buscarEndereco()">
            </div>
            <div class="input-group">
              <label>Bairro</label>
              <input type="text" id="bairro">
            </div>
          </div>

          <div class="input-group">
            <label>Logradouro (Rua/Av)</label>
            <input type="text" id="rua">
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="fecharModal()">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar Cadastro</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Inicialização
    window.onload = () => {
      if(typeof renderClientes === 'function') renderClientes();
    };

    function abrirModal() {
      limparCampos();
      document.getElementById("tituloModal").innerText = "Novo Cliente";
      document.getElementById("modalCliente").style.display = "flex";
    }

    function fecharModal() {
      document.getElementById("modalCliente").style.display = "none";
    }
  </script>
</body>
</html>
