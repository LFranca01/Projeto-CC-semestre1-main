<!DOCTYPE html>
<html lang="pt-br">
<head>

  <meta charset="UTF-8">
  <title>Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="auth.js"></script>
  <script src="api.js"></script>

  <script>
    requireAuth();
  </script>

</head>

<body>

<div class="container">

  <aside class="sidebar">
    <img src="./assets/Logo.png">

    <ul>
      <li class="active">
        <a href="inicio.html"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      </li>
      <li>
        <a href="pedidos.html"><i data-lucide="shopping-cart"></i> Pedidos</a>
      </li>
      <li>
        <a href="clientes.html"><i data-lucide="users"></i> Clientes</a>
      </li>
    </ul>
  </aside>

  <main class="main">
    <div class="content">

      <!-- TOPBAR -->
      <div class="topbar">
        <div class="topbar-actions">

          <div class="search-box">
            <input type="text" id="busca-dashboard" placeholder="Buscar por ID ou cliente...">
          </div>

          <div class="user-menu" onclick="toggleMenu()">
            <img src="https://i.pravatar.cc/40">

            <div class="user-info">
              <span class="user-name"></span>
              <span class="user-email"></span>
            </div>

            <div class="dropdown" id="dropdown">
              <a href="#" onclick="logout()">Sair</a>
            </div>
          </div>

        </div>
      </div>

      <h1>Dashboard</h1>

      <!-- CARDS -->
      <div class="cards">

        <div class="card">
          <p>Total de Pedidos</p>
          <h2 id="totalPedidos">0</h2>
        </div>

        <div class="card">
          <p>Pendentes</p>
          <h2 id="pendentes">0</h2>
        </div>

        <div class="card">
          <p>Enviados</p>
          <h2 id="enviados">0</h2>
        </div>

        <div class="card">
          <p>Entregues</p>
          <h2 id="entregues">0</h2>
        </div>

        <div class="card">
          <p>Faturamento</p>
          <h2 id="faturamento">R$0,00</h2>
        </div>

        <div class="card">
          <canvas id="graficoStatus"></canvas>
        </div>

      </div>

      <!-- TABELA -->
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Status</th>
            <th>Data</th>
            <th>Total</th>
          </tr>
        </thead>

        <tbody id="tabela-dashboard"></tbody>
      </table>

    </div>
  </main>

</div>

<script>

let graficoStatus; 

document.addEventListener("DOMContentLoaded", () => {

  const user = getUser();

  if (user) {
    document.querySelector(".user-name").innerText = user.nome;
    document.querySelector(".user-email").innerText = user.email;
  }

  document
    .getElementById("busca-dashboard")
    .addEventListener("input", filtrarDashboard);

  window.toggleMenu = () => {
    document.getElementById("dropdown").classList.toggle("show");
  };

  document.addEventListener("click", (e) => {
    if (!document.querySelector(".user-menu").contains(e.target)) {
      document.getElementById("dropdown").classList.remove("show");
    }
  });

  atualizarDashboard();
  lucide.createIcons();
});


/* ================= DASHBOARD ================= */

function atualizarDashboard() {
  const pedidos = getPedidos();
  const m = getMetricas();

  document.getElementById("totalPedidos").innerText = m.total;
  document.getElementById("pendentes").innerText = m.pendentes;
  document.getElementById("enviados").innerText = m.enviados;
  document.getElementById("entregues").innerText = m.enviados + m.pendentes < m.total 
    ? m.total - (m.pendentes + m.enviados) 
    : 0;

  document.getElementById("faturamento").innerText =
    m.faturamento.toLocaleString("pt-BR", {
      style: "currency",
      currency: "BRL"
    });

  renderDashboard(pedidos);
  renderGraficoStatus(pedidos);
}

/* ================= GRAFICO ================= */

function gerarDadosStatus(pedidos) {
  let pendentes = 0;
  let enviados = 0;
  let entregues = 0;

  pedidos.forEach(p => {
    if (p.status === "Pendente") pendentes++;
    if (p.status === "Enviado") enviados++;
    if (p.status === "Entregue") entregues++;
  });

  return [pendentes, enviados, entregues];
}

function renderGraficoStatus(pedidos) {

  const ctx = document.getElementById("graficoStatus");

  const dados = gerarDadosStatus(pedidos);

  if (graficoStatus) {
    graficoStatus.destroy();
  }

  graficoStatus = new Chart(ctx, {
    type: "pie",
    data: {
      labels: ["Pendentes", "Enviados", "Entregues"],
      datasets: [{
        data: dados
      }]
    },
    options: {
      responsive: true
    }
  });
}

/* ================= TABELA ================= */

function renderDashboard(lista) {
  const tabela = document.getElementById("tabela-dashboard");

  tabela.innerHTML = "";

  if (lista.length === 0) {
    tabela.innerHTML = `
      <tr>
        <td colspan="5" style="text-align:center; color:#888;">
          Nenhum pedido encontrado
        </td>
      </tr>
    `;
    return;
  }

  lista.forEach(p => {
    const cliente = getClienteById(p.clienteId);

    tabela.innerHTML += `
      <tr>
        <td>${String(p.id).padStart(3, "0")}</td>
        <td>${cliente ? cliente.nome : "N/A"}</td>
        <td>
          <span class="status ${p.status.toLowerCase()}">
            ${getIcon(p.status)} ${p.status}
          </span>
        </td>
        <td>${formatarData(p.data)}</td>
        <td>${(p.total || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}</td>
      </tr>
    `;
  });
}

/* ================= BUSCA ================= */

function filtrarDashboard() {
  const termo = document
    .getElementById("busca-dashboard")
    .value
    .toLowerCase();

  const pedidos = getPedidos();

  const filtrados = pedidos.filter(p => {
    const cliente = getClienteById(p.clienteId);

    return (
      String(p.id).includes(termo) ||
      (cliente && cliente.nome.toLowerCase().includes(termo))
    );
  });

  renderDashboard(filtrados);
}

/* ================= ICONES ================= */

function getIcon(status) {
  if (status === "Pendente") return "⏳";
  if (status === "Enviado") return "🚚";
  return "✔";
}

</script>

</body>
</html>
