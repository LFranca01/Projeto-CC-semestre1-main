<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pedidos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="pedidos.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script>requireAuth();</script>
</head>
<body>
<div class="container">
  <aside class="sidebar">
    <img src="./assets/Logo.png">
    <ul>
      <li><a href="inicio.html"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
      <li class="active"><a href="#"><i data-lucide="shopping-cart"></i> Pedidos</a></li>
      <li><a href="clientes.html"><i data-lucide="users"></i> Clientes</a></li>
    </ul>
  </aside>

  <main class="main">
    <div class="content">
      <div class="topbar">
        <div class="topbar-actions">
          <div class="user-menu" onclick="toggleMenu()">
            <img src="https://i.pravatar.cc/40">
            <div class="user-info">
              <span class="user-name"></span>
              <span class="user-email"></span>
            </div>
            <div class="dropdown" id="dropdown">
              <a href="#" onclick="logout()">Sair</a>
            </div>
          </div>
        </div>
      </div>

      <div class="page-header">
        <h1>Pedidos</h1>
        <button class="btn-primary" onclick="abrirModal()">Novo Pedido</button>
      </div>

      <div class="filter-box">
        <div class="filter-group">
          <label>Buscar</label>
          <input type="text" id="filtro-busca">
        </div>
        <div class="filter-group">
          <label>Status</label>
          <select id="filtro-status">
            <option value="">Todos</option>
            <option>Pendente</option>
            <option>Enviado</option>
            <option>Entregue</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn-secondary" onclick="limparFiltro()">Limpar</button>
          <button class="btn-primary" onclick="filtrarPedidos()">Filtrar</button>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Status</th>
            <th>Data</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="tabela-pedidos"></tbody>
      </table>

      <div class="modal" id="modalPedido">
        <div class="modal-content">
          <div class="modal-header">
            <h2>Novo Pedido</h2>
            <span onclick="fecharModal()" class="close">&times;</span>
          </div>
          <div class="modal-body">
            <select id="clienteSelect"></select>
            <div id="itens"></div>
            <button class="btn-secondary" onclick="addItem()">+ Produto</button>
          </div>
          <div class="modal-footer">
            <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
            <button class="btn-primary" onclick="salvarPedido()">Salvar</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const user = getUser();
  if (user) {
    document.querySelector(".user-name").innerText = user.nome;
    document.querySelector(".user-email").innerText = user.email;
  }
  window.toggleMenu = () => { document.getElementById("dropdown").classList.toggle("show"); };
  document.addEventListener("click", (e) => {
    if (!document.querySelector(".user-menu").contains(e.target)) {
      document.getElementById("dropdown").classList.remove("show");
    }
  });
  carregarClientes();
  renderPedidos();
  lucide.createIcons();
});

function carregarClientes() {
  const select = document.getElementById("clienteSelect");
  const clientes = getClientes();
  select.innerHTML = `<option value="">Selecione um cliente</option>`;
  clientes.forEach(c => { select.innerHTML += `<option value="${c.id}">${c.nome}</option>`; });
}

function addItem() {
  const div = document.getElementById("itens");
  div.innerHTML += `
    <div class="item">
      <input placeholder="Produto">
      <input type="number" placeholder="Qtd">
      <input type="number" placeholder="Preço">
    </div>`;
}

function filtrarPedidos() {
  const busca = document.getElementById("filtro-busca").value.toLowerCase();
  const status = document.getElementById("filtro-status").value.toLowerCase();
  document.querySelectorAll("#tabela-pedidos tr").forEach(linha => {
    const texto = linha.innerText.toLowerCase();
    linha.style.display = (texto.includes(busca) && (status === "" || texto.includes(status))) ? "" : "none";
  });
}

function limparFiltro() {
  document.getElementById("filtro-busca").value = "";
  document.getElementById("filtro-status").value = "";
  renderPedidos();
}

function renderPedidos() {
  const tabela = document.getElementById("tabela-pedidos");
  const pedidos = getPedidos();
  tabela.innerHTML = "";
  pedidos.forEach((p, index) => {
    const cliente = getClienteById(p.clienteId);
    tabela.innerHTML += `
      <tr>
        <td>${String(index + 1).padStart(3, "0")}</td>
        <td>${cliente ? cliente.nome : p.cliente}</td>
        <td>
          <span class="status ${p.status.toLowerCase()}" onclick="trocarStatus(${p.id})">
            ${getIcon(p.status)} ${p.status}
          </span>
        </td>
        <td>${formatarData(p.data)}</td>
        <td>R$ ${Number(p.total).toFixed(2)}</td>
      </tr>`;
  });
}

function trocarStatus(id) { updateStatus(id); renderPedidos(); }
function getIcon(status) { return status === "Pendente" ? "⏳" : status === "Enviado" ? "🚚" : "✔"; }
function abrirModal() { document.getElementById("modalPedido").style.display = "flex"; document.getElementById("itens").innerHTML = ""; }
function fecharModal() { document.getElementById("modalPedido").style.display = "none"; }

function salvarPedido() {
  const clienteId = document.getElementById("clienteSelect").value;
  if (!clienteId) { alert("Selecione um cliente"); return; }
  const cliente = getClientes().find(c => c.id == clienteId);
  const itens = [];
  document.querySelectorAll(".item").forEach(i => {
    const inputs = i.querySelectorAll("input");
    const produto = inputs[0].value;
    const qtd = parseFloat(inputs[1].value);
    const preco = parseFloat(inputs[2].value);
    if (produto && qtd && preco) itens.push({ produto, qtd, preco });
  });
  if (itens.length === 0) { alert("Adicione pelo menos 1 produto"); return; }
  const total = itens.reduce((acc, i) => acc + (i.qtd * i.preco), 0);
  createPedido({ clienteId, cliente: cliente.nome, itens, total, status: "Pendente" });
  renderPedidos();
  fecharModal();
}
</script>
</body>
</html>
