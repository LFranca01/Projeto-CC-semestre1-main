<!DOCTYPE html>
<html lang="pt-br">
<head>

  <meta charset="UTF-8">
  <title>Detalhe do Cliente</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="auth.js"></script>
  <script src="api.js"></script>

  <script>
    requireAuth();
  </script>

</head>

<body>

<div class="container">

  <aside class="sidebar">
    <img src="./assets/Logo.png">

    <ul>
      <li><a href="inicio.html">Dashboard</a></li>
      <li><a href="pedidos.html">Pedidos</a></li>
      <li class="active"><a href="clientes.html">Clientes</a></li>
    </ul>
  </aside>

  <main class="main">
    <div class="content">

      <h1 id="nomeCliente"></h1>

      <div class="cards">
        <div class="card">
          <p>Total de Pedidos</p>
          <h2 id="totalPedidos">0</h2>
        </div>

        <div class="card">
          <p>Total Gasto</p>
          <h2 id="totalGasto">R$0,00</h2>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Status</th>
            <th>Data</th>
            <th>Total</th>
          </tr>
        </thead>

        <tbody id="tabela-pedidos"></tbody>
      </table>

    </div>
  </main>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(window.location.search);
  const clienteId = params.get("id");

  const clientes = getClientes();
  const pedidos = getPedidos();

  const cliente = clientes.find(c => c.id == clienteId);

  if (!cliente) {
    alert("Cliente não encontrado");
    return;
  }

  document.getElementById("nomeCliente").innerText = cliente.nome;

  const pedidosCliente = pedidos.filter(p => p.clienteId == clienteId);

  let total = 0;

  pedidosCliente.forEach(p => {
    total += Number(p.total || 0);
  });

  document.getElementById("totalPedidos").innerText = pedidosCliente.length;

  document.getElementById("totalGasto").innerText =
    total.toLocaleString("pt-BR", {
      style: "currency",
      currency: "BRL"
    });

  renderTabela(pedidosCliente);

  lucide.createIcons();
});

/* RENDER */
function renderTabela(lista) {
  const tabela = document.getElementById("tabela-pedidos");

  tabela.innerHTML = "";

  lista.forEach(p => {
    tabela.innerHTML += `
      <tr>
        <td>${p.id}</td>
        <td>${p.status}</td>
        <td>${formatarData(p.data)}</td>
        <td>${Number(p.total || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
